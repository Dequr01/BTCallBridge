name: Build APKs

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build Host APK
        run: ./gradlew :app-host:assembleDebug --stacktrace

      - name: Build Client APK
        run: ./gradlew :app-client:assembleDebug --stacktrace

      - name: List APKs (Debug)
        run: find . -name "*.apk"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: BTCallBridge-APKs
          path: "**/build/outputs/apk/debug/*.apk"
